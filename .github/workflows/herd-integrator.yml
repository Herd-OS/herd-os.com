name: HerdOS Integrator
on:
  workflow_run:
    workflows: ["HerdOS Worker"]
    types: [completed]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  statuses: read
  checks: read

jobs:
  integrate:
    if: vars.HERD_ENABLED == 'true' && github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'skipped'
    runs-on: [self-hosted, '${{ vars.HERD_RUNNER_LABEL || ''herd-worker'' }}']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Consolidate, advance, and review
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          herd integrator consolidate --run-id ${{ github.event.workflow_run.id }}
          herd integrator check-ci --run-id ${{ github.event.workflow_run.id }}
          herd integrator advance --run-id ${{ github.event.workflow_run.id }}
          herd integrator review --run-id ${{ github.event.workflow_run.id }}

  advance-on-close:
    if: vars.HERD_ENABLED == 'true' && github.event_name == 'issues'
    runs-on: [self-hosted, '${{ vars.HERD_RUNNER_LABEL || ''herd-worker'' }}']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check if herd issue and advance
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BODY="${{ github.event.issue.body }}"
          BATCH=$(echo "$BODY" | grep -oP '^\s*batch:\s*\K[0-9]+' | head -1)
          if [ -n "$BATCH" ]; then
            herd integrator advance --batch "$BATCH"
          else
            echo "Not a herd issue — skipping."
          fi

  re-review:
    if: >
      vars.HERD_ENABLED == 'true'
      && github.event_name == 'pull_request_review'
      && startsWith(github.event.pull_request.title, '[herd]')
    runs-on: [self-hosted, '${{ vars.HERD_RUNNER_LABEL || ''herd-worker'' }}']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Handle review
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.review.state }}" = "approved" ]; then
            herd integrator merge --pr ${{ github.event.pull_request.number }}
          else
            herd integrator review --pr ${{ github.event.pull_request.number }}
          fi

  cleanup:
    if: >
      vars.HERD_ENABLED == 'true'
      && github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.title, '[herd]')
    runs-on: [self-hosted, '${{ vars.HERD_RUNNER_LABEL || ''herd-worker'' }}']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Post-merge cleanup
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          herd integrator cleanup --pr ${{ github.event.pull_request.number }}
